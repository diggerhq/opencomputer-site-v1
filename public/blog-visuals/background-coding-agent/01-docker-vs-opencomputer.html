<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker vs OpenComputer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap');

  :root{
    --ink:#161513;
    --ink-soft:#3a3833;
    --coral:#e3613a;
    --line:#dcd8cf;
    --card:#fbfaf6;
    --cream:#f5f3ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:transparent;
    color:var(--ink);
    font-family:'Inter',sans-serif;
    padding:0;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px;margin:0 auto}

  /* toggle */
  .toggle{
    display:inline-flex;border:1.5px solid var(--ink);
    border-radius:2px;overflow:hidden;margin-bottom:24px;
    font-family:'JetBrains Mono',monospace;
  }
  .toggle button{
    background:transparent;border:none;cursor:pointer;
    padding:11px 22px;font-family:inherit;font-size:13px;
    font-weight:500;letter-spacing:.04em;color:var(--ink);
    transition:all .22s ease;position:relative;
  }
  .toggle button:first-child{border-right:1.5px solid var(--ink)}
  .toggle button.active{background:var(--ink);color:#fff}

  .stage{position:relative}

  .panel{
    display:grid;grid-template-columns:1fr 1fr;gap:1px;
    background:var(--line);border:1px solid var(--line);
    border-radius:4px;overflow:hidden;
  }
  .col{background:var(--card);padding:26px 24px}
  .col h3{
    font-family:'JetBrains Mono',monospace;
    font-size:12px;font-weight:700;letter-spacing:.12em;
    text-transform:uppercase;margin-bottom:4px;
  }
  .col .sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;min-height:32px}
  .col.docker h3{color:var(--ink-soft)}
  .col.oc h3{color:var(--coral)}

  .row{
    display:flex;gap:12px;padding:13px 0;
    border-top:1px solid var(--line);align-items:flex-start;
  }
  .row:first-of-type{border-top:none}
  .ic{
    flex:0 0 22px;height:22px;border-radius:50%;
    display:grid;place-items:center;margin-top:1px;
    font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;
  }
  .docker .ic{background:#e9e6df;color:var(--ink-soft)}
  .oc .ic{background:var(--coral);color:#fff}
  .rt{font-size:13.5px;line-height:1.45}
  .rt b{font-weight:600}
  .rt span{display:block;color:var(--ink-soft);font-size:12px;margin-top:2px}

  /* animated boot demo */
  .demo{
    margin-top:24px;border:1px solid var(--line);border-radius:4px;
    background:var(--card);padding:24px;
  }
  .demo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:12px}
  .demo-top .lbl{
    font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
    letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);
  }
  .replay{
    font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;
    background:var(--ink);color:#fff;border:none;padding:8px 16px;
    border-radius:2px;letter-spacing:.04em;transition:opacity .2s;
  }
  .replay:hover{opacity:.82}
  .track{position:relative;height:74px}
  .vm{
    position:absolute;top:0;height:50px;width:88px;border-radius:3px;
    border:1.5px solid var(--ink);background:var(--cream);
    display:grid;place-items:center;font-family:'JetBrains Mono',monospace;
    font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--ink);
    opacity:0;transform:translateY(8px) scale(.85);
  }
  .vm.coral{border-color:var(--coral);color:var(--coral)}
  @keyframes pop{
    0%{opacity:0;transform:translateY(8px) scale(.85)}
    18%{opacity:1;transform:translateY(0) scale(1)}
    72%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:0;transform:translateY(-8px) scale(.92)}
  }
  @keyframes persist{
    0%{opacity:0;transform:translateY(8px) scale(.85)}
    18%{opacity:1;transform:translateY(0) scale(1)}
    100%{opacity:1;transform:translateY(0) scale(1)}
  }
  @media(max-width:640px){
    .panel{grid-template-columns:1fr}
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="toggle">
    <button id="bSame" class="active">What&#39;s the same</button>
    <button id="bDiff">What&#39;s different</button>
  </div>

  <div class="stage">
    <div class="panel">
      <div class="col docker">
        <h3>Docker image</h3>
        <div class="sub">The model you already know.</div>
        <div id="dockerRows"></div>
      </div>
      <div class="col oc">
        <h3>OpenComputer sandbox</h3>
        <div class="sub">A full VM you keep around.</div>
        <div id="ocRows"></div>
      </div>
    </div>
  </div>

  <div class="demo">
    <div class="demo-top">
      <span class="lbl">Boot &amp; teardown &mdash; one issue per sandbox</span>
      <button class="replay" id="replay">&#9655; replay</button>
    </div>
    <div class="track" id="track"></div>
  </div>
</div>

<script>
  const SAME = [
    {ic:"✓", t:"Declarative build", s:"Layer commands like apt_install + run_commands."},
    {ic:"✓", t:"Reproducible", s:"Same definition → same environment, every time."},
    {ic:"✓", t:"Base + layers", s:"Start from a base, bake your tools on top."},
    {ic:"✓", t:"Cached rebuilds", s:"First build is slow; after that it's near-instant."},
  ];
  const DOCK = [
    {ic:"×", t:"Shared host kernel", s:"Containers share the host's kernel."},
    {ic:"×", t:"Ephemeral by default", s:"State is gone when the container exits."},
    {ic:"×", t:"Tagged images", s:"Addressed by a mutable :tag you assign."},
    {ic:"×", t:"Process isolation", s:"Namespaces & cgroups, not hardware."},
  ];
  const OC = [
    {ic:"✓", t:"Own KVM kernel", s:"Full VM: kernel, memory, disk, net namespace."},
    {ic:"✓", t:"Persists between runs", s:"You get root and it sticks around like a VPS."},
    {ic:"✓", t:"Content-hashed", s:"Addressed by the hash of its definition."},
    {ic:"✓", t:"Hardware isolation", s:"Isolated by KVM at the hardware level."},
  ];

  const dockerRows = document.getElementById('dockerRows');
  const ocRows = document.getElementById('ocRows');

  function render(mode){
    const d = mode==='same' ? SAME : DOCK;
    const o = mode==='same' ? SAME : OC;
    dockerRows.innerHTML = d.map(r=>row('docker',r)).join('');
    ocRows.innerHTML = o.map(r=>row('oc',r)).join('');
    [...document.querySelectorAll('.row')].forEach((el,i)=>{
      el.style.opacity=0;el.style.transform='translateY(6px)';
      el.style.transition='all .35s ease';
      setTimeout(()=>{el.style.opacity=1;el.style.transform='none'},40*i+30);
    });
  }
  function row(cls,r){
    return `<div class="row ${cls}"><span class="ic">${r.ic}</span><span class="rt"><b>${r.t}</b><span>${r.s}</span></span></div>`;
  }

  const bSame=document.getElementById('bSame'), bDiff=document.getElementById('bDiff');
  bSame.onclick=()=>{bSame.classList.add('active');bDiff.classList.remove('active');render('same')};
  bDiff.onclick=()=>{bDiff.classList.add('active');bSame.classList.remove('active');render('diff')};
  render('same');

  // boot demo
  const track=document.getElementById('track');
  function runDemo(){
    track.innerHTML='';
    const persistent=mk('SERVER',true,8);
    persistent.style.animation='persist 1s ease forwards';
    track.appendChild(persistent);
    [0,1,2].forEach((n,i)=>{
      const vm=mk('issue-'+(n+1),false,150+i*132);
      vm.classList.add('coral');
      vm.style.animation='pop 3.4s ease forwards';
      vm.style.animationDelay=(0.5+i*0.45)+'s';
      track.appendChild(vm);
    });
  }
  function mk(label,server,left){
    const d=document.createElement('div');
    d.className='vm';d.textContent=label;d.style.left=left+'px';
    if(server){d.style.width='110px';d.style.background='#161513';d.style.color='#f5f3ee';d.style.borderColor='#161513';}
    return d;
  }
  document.getElementById('replay').onclick=runDemo;
  runDemo();
</script>
</body>
</html>
