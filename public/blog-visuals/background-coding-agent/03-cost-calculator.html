<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What it actually costs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500&display=swap');
  :root{
    --cream:#f5f3ee;--ink:#161513;--ink-soft:#403d37;--coral:#e3613a;
    --line:#dcd8cf;--card:#fbfaf6;--mute:#8a857b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:transparent;color:var(--ink);font-family:'Inter',sans-serif;padding:0;-webkit-font-smoothing:antialiased}
  .wrap{max-width:880px;margin:0 auto}

  .grid{display:grid;grid-template-columns:1.1fr .9fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .controls{background:var(--card);padding:30px 28px}
  .readout{background:#161513;padding:30px 28px;color:var(--cream);display:flex;flex-direction:column}

  .field{margin-bottom:26px}
  .field:last-child{margin-bottom:0}
  .flabel{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft);display:flex;justify-content:space-between;margin-bottom:12px}
  .flabel .val{color:var(--coral)}

  .seg{display:flex;border:1.5px solid var(--ink);border-radius:2px;overflow:hidden}
  .seg button{flex:1;background:transparent;border:none;cursor:pointer;padding:10px 6px;font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:500;color:var(--ink);transition:all .2s;border-right:1.5px solid var(--ink)}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--ink);color:var(--cream)}

  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--line);outline:none;margin-top:6px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--coral);cursor:pointer;border:3px solid var(--card);box-shadow:0 0 0 1.5px var(--coral)}
  input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--coral);cursor:pointer;border:3px solid var(--card);box-shadow:0 0 0 1.5px var(--coral)}
  .scale{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mute);margin-top:7px}

  .rlabel{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#9a948a;margin-bottom:6px}
  .big{font-family:'Newsreader',serif;font-size:64px;line-height:1;letter-spacing:-.02em;margin-bottom:4px}
  .big .cents{color:var(--coral)}
  .per{font-family:'JetBrains Mono',monospace;font-size:12px;color:#9a948a;margin-bottom:28px}

  .breakdown{border-top:1px solid #33312c;padding-top:18px;margin-top:auto}
  .brow{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:7px 0;color:#cfc9bd}
  .brow b{color:var(--cream);font-weight:500}
  .bar{height:5px;border-radius:3px;background:#33312c;margin-top:3px;overflow:hidden}
  .bar i{display:block;height:100%;background:var(--coral);transition:width .4s ease}
  .bar.vm i{background:#6b8f74}

  .monthly{margin-top:22px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#9a948a;line-height:1.7}
  .monthly b{color:var(--coral)}
  @media(max-width:640px){.grid{grid-template-columns:1fr}.big{font-size:52px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="grid">
    <div class="controls">
      <div class="field">
        <div class="flabel"><span>Model</span></div>
        <div class="seg" id="modelSeg">
          <button data-m="haiku">Haiku</button>
          <button data-m="sonnet" class="on">Sonnet</button>
          <button data-m="opus">Opus</button>
        </div>
      </div>

      <div class="field">
        <div class="flabel"><span>Context Claude reads</span><span class="val" id="ctxVal">Medium</span></div>
        <input type="range" id="ctx" min="0" max="2" step="1" value="1">
        <div class="scale"><span>Small repo</span><span>Sprawling</span></div>
      </div>

      <div class="field">
        <div class="flabel"><span>Turns used</span><span class="val" id="turnVal">18</span></div>
        <input type="range" id="turns" min="4" max="50" step="1" value="18">
        <div class="scale"><span>4</span><span>50 (max)</span></div>
      </div>

      <div class="field">
        <div class="flabel"><span>Issues per month</span><span class="val" id="volVal">60</span></div>
        <input type="range" id="vol" min="5" max="300" step="5" value="60">
        <div class="scale"><span>5</span><span>300</span></div>
      </div>
    </div>

    <div class="readout">
      <div class="rlabel">Cost per task</div>
      <div class="big">$<span id="dollars">0</span>.<span class="cents" id="cents">30</span></div>
      <div class="per" id="perNote">~ 3–8 min of VM time, then gone</div>

      <div class="breakdown">
        <div class="brow"><span>Anthropic API</span><b id="apiCost">$0.29</b></div>
        <div class="bar"><i id="apiBar" style="width:97%"></i></div>
        <div class="brow" style="margin-top:12px"><span>VM compute</span><b id="vmCost">$0.004</b></div>
        <div class="bar vm"><i id="vmBar" style="width:3%"></i></div>
      </div>

      <div class="monthly">
        <span id="monthlyLine">~60 issues/mo → <b>$18.00</b> in tokens</span><br>
        + persistent box <b>$8.76/mo</b>
      </div>
    </div>
  </div>
</div>

<script>
  const MODELS={
    haiku:{label:'Haiku',base:0.04,perTurn:0.0015},
    sonnet:{label:'Sonnet',base:0.12,perTurn:0.009},
    opus:{label:'Opus',base:0.45,perTurn:0.045},
  };
  const CTX={0:{m:0.6,label:'Small'},1:{m:1.0,label:'Medium'},2:{m:1.7,label:'Sprawling'}};

  let model='sonnet';
  const ctx=document.getElementById('ctx'),turns=document.getElementById('turns'),vol=document.getElementById('vol');

  function calc(){
    const c=CTX[ctx.value], M=MODELS[model];
    const t=+turns.value;
    let api=(M.base + M.perTurn*t)*c.m;
    api=Math.max(0.01,api);
    const vm=0.0008 + t*0.00009;
    const total=api+vm;

    const dollars=Math.floor(total);
    const cents=Math.round((total-dollars)*100).toString().padStart(2,'0');
    document.getElementById('dollars').textContent=dollars;
    document.getElementById('cents').textContent=cents;

    document.getElementById('apiCost').textContent='$'+api.toFixed(2);
    document.getElementById('vmCost').textContent='$'+vm.toFixed(3);
    const apiPct=Math.round(api/total*100);
    document.getElementById('apiBar').style.width=apiPct+'%';
    document.getElementById('vmBar').style.width=(100-apiPct)+'%';

    document.getElementById('ctxVal').textContent=c.label;
    document.getElementById('turnVal').textContent=t;
    document.getElementById('volVal').textContent=vol.value;

    const monthly=total*+vol.value;
    document.getElementById('monthlyLine').innerHTML=
      `~${vol.value} issues/mo → <b>$${monthly.toFixed(2)}</b> in tokens`;

    const mins= model==='haiku'?'1–3':model==='opus'?'5–12':'3–8';
    document.getElementById('perNote').textContent=`~ ${mins} min of VM time, then gone`;
  }

  document.querySelectorAll('#modelSeg button').forEach(b=>{
    b.onclick=()=>{
      document.querySelectorAll('#modelSeg button').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');model=b.dataset.m;calc();
    };
  });
  [ctx,turns,vol].forEach(el=>el.addEventListener('input',calc));
  calc();
</script>
</body>
</html>
