<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Latencies illustration</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#F4F1EB; }
  .fig { max-width:880px; margin:0 auto; padding:40px 24px; }
  .fig svg { display:block; width:100%; height:auto; }
</style>
</head>
<body>
<div class="fig">
<svg viewBox="0 0 800 300" role="img" aria-label="Boot under 1 second p95, wake 1 to 2 seconds, hibernate about 6 seconds, against a stock QEMU cold boot of about 30 seconds.">
  <!-- bars -->
  <rect x="120" y="46" width="21" height="22" rx="4" fill="#DE633B"/>
  <text x="153" y="62" font-size="12" letter-spacing="2" fill="#DE633B" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">BOOT &lt;1S P95</text>

  <rect x="120" y="98" width="43" height="22" rx="4" fill="#161513"/>
  <text x="175" y="114" font-size="12" letter-spacing="2" fill="#161513" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">WAKE 1&ndash;2S</text>

  <rect x="120" y="150" width="128" height="22" rx="4" fill="#161513"/>
  <text x="260" y="166" font-size="12" letter-spacing="2" fill="#161513" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">HIBERNATE ~6S</text>

  <rect x="120" y="208" width="640" height="22" rx="4" fill="none" stroke="#8B857A" stroke-width="1.3" stroke-dasharray="5 4"/>
  <text x="120" y="252" font-size="12" letter-spacing="2" fill="#8B857A" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">STOCK QEMU COLD BOOT ~30S</text>

  <!-- time axis -->
  <line x1="120" y1="186" x2="760" y2="186" stroke="rgba(22,21,19,0.16)" stroke-width="1"/>
  <line x1="120" y1="276" x2="760" y2="276" stroke="rgba(22,21,19,0.25)" stroke-width="1"/>
  <g fill="#8B857A">
    <line x1="120" y1="276" x2="120" y2="282" stroke="#8B857A" stroke-width="1"/>
    <text x="120" y="296" font-size="10" letter-spacing="1" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">0s</text>
    <line x1="333" y1="276" x2="333" y2="282" stroke="#8B857A" stroke-width="1"/>
    <text x="333" y="296" font-size="10" letter-spacing="1" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">10s</text>
    <line x1="547" y1="276" x2="547" y2="282" stroke="#8B857A" stroke-width="1"/>
    <text x="547" y="296" font-size="10" letter-spacing="1" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">20s</text>
    <line x1="760" y1="276" x2="760" y2="282" stroke="#8B857A" stroke-width="1"/>
    <text x="760" y="296" font-size="10" letter-spacing="1" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">30s</text>
  </g>
</svg>
</div>
</body>
</html>
