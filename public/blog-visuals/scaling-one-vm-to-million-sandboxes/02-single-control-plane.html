<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Single control plane illustration</title>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  body { margin:0; background:#F4F1EB; }
  .fig { max-width:880px; margin:0 auto; padding:40px 24px; }
  .fig svg { display:block; width:100%; height:auto; }
</style>
</head>
<body>
<div class="fig">
<svg viewBox="0 0 800 320" role="img" aria-label="One control plane running web UI, dashboard, billing, and orchestration, connected to three workers in one Azure region.">
  <defs>
    <marker id="a2" viewBox="0 0 12 12" markerUnits="userSpaceOnUse" markerWidth="12" markerHeight="12" refX="9.6" refY="6" orient="auto-start-reverse">
      <path d="M2.4,2.4 L9.6,6 L2.4,9.6" fill="none" stroke="#161513" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="50" y="26" width="700" height="268" rx="16" fill="none" stroke="#8B857A" stroke-width="1.3" stroke-dasharray="6 7"/>
  <rect x="110" y="74" width="230" height="180" rx="10" fill="#F4F1EB" stroke="#161513" stroke-width="1.8"/>
  <text x="225" y="104" font-size="13" letter-spacing="2" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">CONTROL PLANE</text>
  <line x1="130" y1="118" x2="320" y2="118" stroke="rgba(22,21,19,0.2)" stroke-width="1"/>
  <text x="225" y="143" font-size="11" letter-spacing="2" text-anchor="middle" fill="#8B857A" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">WEB UI</text>
  <text x="225" y="171" font-size="11" letter-spacing="2" text-anchor="middle" fill="#8B857A" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">DASHBOARD</text>
  <text x="225" y="199" font-size="11" letter-spacing="2" text-anchor="middle" fill="#8B857A" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">BILLING</text>
  <text x="225" y="227" font-size="11" letter-spacing="2" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">ORCHESTRATION</text>
  <rect x="540" y="52" width="160" height="58" rx="8" fill="#F4F1EB" stroke="#161513" stroke-width="1.4"/>
  <text x="620" y="86" font-size="12" letter-spacing="2" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">WORKER</text>
  <rect x="540" y="135" width="160" height="58" rx="8" fill="#F4F1EB" stroke="#161513" stroke-width="1.4"/>
  <text x="620" y="169" font-size="12" letter-spacing="2" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">WORKER</text>
  <rect x="540" y="218" width="160" height="58" rx="8" fill="#F4F1EB" stroke="#161513" stroke-width="1.4"/>
  <text x="620" y="252" font-size="12" letter-spacing="2" text-anchor="middle" font-family="'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, Consolas, monospace">WORKER</text>
  <path d="M340,164 C438,164 438,81 534,81"   fill="none" stroke="#161513" stroke-width="1.4" marker-end="url(#a2)"/>
  <path d="M340,164 L534,164"                  fill="none" stroke="#161513" stroke-width="1.4" marker-end="url(#a2)"/>
  <path d="M340,164 C438,164 438,247 534,247" fill="none" stroke="#161513" stroke-width="1.4" marker-end="url(#a2)"/>
</svg>
</div>
</body>
</html>
