<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Triage Agent — SecretStore in-flight replacement</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap');
  :root{
    --cream:#f5f3ee;--ink:#161513;--ink-soft:#403d37;--coral:#e3613a;
    --line:#dcd8cf;--card:#fbfaf6;--mute:#8a857b;--green:#3a7d44;--red:#c0392b;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:transparent;color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:960px;margin:0 auto}
  .ctrl{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .btn{font-family:'JetBrains Mono',monospace;font-size:12px;cursor:pointer;border:1.5px solid var(--ink);background:transparent;color:var(--ink);padding:9px 16px;border-radius:2px;letter-spacing:.03em;transition:all .2s}
  .btn:hover{background:var(--ink);color:#fff}
  .btn.danger{border-color:var(--red);color:var(--red)}
  .btn.danger:hover{background:var(--red);color:#fff}
  .btn:disabled{opacity:.35;cursor:default}
  .status{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--ink-soft);width:100%}
  .status b.ok{color:var(--green)} .status b.bad{color:var(--red)}
  .diagram{border:1px solid var(--line);border-radius:6px;background:var(--card);padding:26px 20px;overflow:hidden}
  svg{width:100%;height:auto;display:block;overflow:visible}
  .box{fill:var(--cream);stroke:var(--ink);stroke-width:1.5}
  .box.proxy{fill:#161513}
  .box.dest{stroke-width:1.5}
  .box.dest.blockedhost{stroke-dasharray:4 3;stroke:var(--mute)}
  .nt{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;fill:var(--ink)}
  .nt.light{fill:var(--cream)}
  .ns{font-family:'Inter',sans-serif;font-size:10.5px;fill:var(--ink-soft)}
  .ns.light{fill:#b8b3a8}
  .edge{stroke:var(--line);stroke-width:1.5;fill:none}
  .packet{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;opacity:0}
  .packet rect{fill:#fff;stroke:var(--coral);stroke-width:1.5;rx:3}
  .packet text{fill:var(--ink)}
  .packet.real rect{stroke:var(--green)}
  .stamp{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;opacity:0}
  .stamp.allow{fill:var(--green)}
  .stamp.deny{fill:var(--red)}
</style>
</head>
<body>
<div class="wrap">
  <div class="ctrl">
    <button class="btn" id="legit">&#9655; agent calls api.anthropic.com</button>
    <button class="btn danger" id="evil">&#9655; injected prompt tries attacker.net</button>
    <span class="status" id="status">The agent's env only ever holds a placeholder. The real key exists on the proxy, outside the sandbox.</span>
  </div>

  <div class="diagram">
    <svg viewBox="0 0 900 320" id="svg" role="img" aria-label="SecretStore proxy diagram">
      <!-- edges -->
      <path class="edge" d="M250 160 L390 160"/>
      <path class="edge" d="M540 130 C620 90 660 80 700 70"/>
      <path class="edge" d="M540 190 C620 230 660 240 700 250"/>

      <!-- sandbox -->
      <rect class="box" x="40" y="100" width="210" height="120" rx="6"/>
      <text class="nt" x="60" y="130">SANDBOX</text>
      <text class="ns" x="60" y="152">Claude Code runs here</text>
      <text class="ns" x="60" y="172">ANTHROPIC_API_KEY=</text>
      <text class="ns" x="60" y="188" style="font-family:'JetBrains Mono',monospace;font-size:10px">oc_secret_a91f&hellip;  (placeholder)</text>
      <text class="ns" x="60" y="208" style="font-style:italic">prompt injection lands here</text>

      <!-- proxy -->
      <rect class="box proxy" x="390" y="110" width="150" height="100" rx="6"/>
      <text class="nt light" x="412" y="142">SECRET</text>
      <text class="nt light" x="412" y="158">STORE</text>
      <text class="ns light" x="412" y="180">egress proxy</text>
      <text class="ns light" x="412" y="195">swaps key in flight</text>

      <!-- allowed dest -->
      <rect class="box dest" x="700" y="35" width="170" height="64" rx="6"/>
      <text class="nt" x="718" y="62">api.anthropic.com</text>
      <text class="ns" x="718" y="82">on the allowlist</text>

      <!-- blocked dest -->
      <rect class="box dest blockedhost" x="700" y="218" width="170" height="64" rx="6"/>
      <text class="nt" x="718" y="245" fill="var(--mute)">attacker.net</text>
      <text class="ns" x="718" y="265">not on the allowlist</text>

      <!-- packet: placeholder leg -->
      <g class="packet" id="p1">
        <rect x="-72" y="-13" width="144" height="26"/>
        <text x="0" y="4" text-anchor="middle">oc_secret_a91f&hellip;</text>
      </g>
      <!-- packet: real-key leg -->
      <g class="packet real" id="p2">
        <rect x="-72" y="-13" width="144" height="26"/>
        <text x="0" y="4" text-anchor="middle">sk-ant-api03-&hellip;</text>
      </g>

      <text class="stamp allow" id="stampAllow" x="556" y="52">&#10003; key injected</text>
      <text class="stamp deny" id="stampDeny" x="536" y="288">&#10007; blocked at proxy</text>
    </svg>
  </div>
</div>

<script>
  var p1=document.getElementById('p1'),p2=document.getElementById('p2'),
      stampAllow=document.getElementById('stampAllow'),stampDeny=document.getElementById('stampDeny'),
      status=document.getElementById('status'),
      legit=document.getElementById('legit'),evil=document.getElementById('evil');

  function lerp(a,b,t){return a+(b-a)*t}
  function animate(el,from,to,ms,done){
    var t0=null;
    function frame(ts){
      if(!t0)t0=ts;
      var t=Math.min((ts-t0)/ms,1);
      el.setAttribute('transform','translate('+lerp(from[0],to[0],t)+','+lerp(from[1],to[1],t)+')');
      el.style.opacity=1;
      if(t<1)requestAnimationFrame(frame);else if(done)done();
    }
    requestAnimationFrame(frame);
  }
  function resetAll(){
    [p1,p2].forEach(function(p){p.style.opacity=0});
    [stampAllow,stampDeny].forEach(function(s){s.style.opacity=0});
  }
  function lock(v){legit.disabled=v;evil.disabled=v}

  legit.addEventListener('click',function(){
    resetAll();lock(true);
    status.innerHTML='Agent sends the request with the <b>placeholder</b>&hellip;';
    animate(p1,[320,160],[465,160],900,function(){
      p1.style.opacity=0;
      status.innerHTML='Destination is on the allowlist - the proxy swaps in the <b class="ok">real key, in flight</b>.';
      animate(p2,[610,115],[700,68],900,function(){
        stampAllow.style.opacity=1;
        status.innerHTML='<b class="ok">Request delivered with the real key.</b> The agent never saw it - nothing in the sandbox to exfiltrate.';
        lock(false);
      });
    });
  });

  evil.addEventListener('click',function(){
    resetAll();lock(true);
    status.innerHTML='A poisoned report told the agent to POST the key to attacker.net&hellip;';
    animate(p1,[320,160],[465,160],900,function(){
      p1.style.opacity=0;
      status.innerHTML='attacker.net is <b class="bad">not on the egress allowlist</b>&hellip;';
      setTimeout(function(){
        stampDeny.style.opacity=1;
        status.innerHTML='<b class="bad">Blocked at the proxy.</b> And even if it had gotten through, the payload only contains the worthless placeholder.';
        lock(false);
      },700);
    });
  });
</script>
</body>
</html>
